<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="XCMS">
  <title>XCMS</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="92%" y2="100%">
      <stop offset="0%" stop-color="#B79DFB"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="lift" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="3.5" flood-color="#3A1D7A" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <g transform="translate(64,64)" filter="url(#lift)">
    <!-- CMS page -->
    <rect x="-40" y="-42" width="76" height="84" rx="9" fill="#ffffff"/>
    <rect x="-30" y="-33" width="56" height="20" rx="3" fill="#5FC8F5"/>
    <circle cx="16" cy="-25" r="4.5" fill="#FFE08A"/>
    <line x1="-30" y1="-4" x2="20" y2="-4" stroke="#9FB6CC" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="-30" y1="7" x2="26" y2="7" stroke="#CBD8E6" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="-30" y1="18" x2="6" y2="18" stroke="#CBD8E6" stroke-width="4.5" stroke-linecap="round"/>

    <!-- GraphQL API badge -->
    <circle cx="28" cy="28" r="15" fill="#5A38C0" stroke="#ffffff" stroke-width="2.5"/>
    <g stroke="#ffffff" stroke-width="2.1"><line x1="28" y1="20" x2="21" y2="34"/><line x1="28" y1="20" x2="36" y2="33"/><line x1="21" y1="34" x2="36" y2="33"/></g>
    <circle cx="28" cy="20" r="3.1" fill="#ffffff"/>
    <circle cx="20.5" cy="34.5" r="3.1" fill="#ffffff"/>
    <circle cx="36" cy="33" r="3.1" fill="#ffffff"/>
  </g>
</svg>
